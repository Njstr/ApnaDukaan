{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div style="max-width:380px;margin:60px auto;">
  <div style="text-align:center;margin-bottom:28px;">
    <div style="font-size:36px;margin-bottom:8px;">🔐</div>
    <h1 style="font-size:22px;font-weight:700;">Admin Login</h1>
    <p style="color:var(--muted);font-size:13px;margin-top:4px;">Control Panel – Not linked in UI</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group"><label class="form-label">Username</label><input class="form-input" name="username" autofocus required></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" name="password" required></div>
      <button class="btn btn-primary" type="submit" style="width:100%;">Login</button>
    </form>
  </div>
</div>
{% endblock %}
