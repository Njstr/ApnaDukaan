{% extends "base.html" %}
{% block title %}Settings – Admin{% endblock %}
{% block content %}
<div class="admin-back">
  <a href="/control-panel/">← Dashboard</a>
  <span class="admin-breadcrumb">Admin › Settings</span>
</div>
<h1 class="page-title">Admin Settings</h1>
<div class="grid2" style="gap:20px;align-items:start;">
  <div class="card">
    <div style="font-weight:700;margin-bottom:14px;">Platform Stats</div>
    {% for k,v in stats.items() %}
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;">
      <span style="color:var(--muted);">{{ k|capitalize }}</span>
      <span style="font-weight:700;">{{ v }}</span>
    </div>
    {% endfor %}
  </div>
  <div class="card">
    <div style="font-weight:700;margin-bottom:14px;">Change Password</div>
    <form method="POST">
      <input type="hidden" name="action" value="change_password">
      <div class="form-group"><label class="form-label">Current Password</label><input class="form-input" type="password" name="current_password" required></div>
      <div class="form-group"><label class="form-label">New Password</label><input class="form-input" type="password" name="new_password" required minlength="8"></div>
      <div class="form-group"><label class="form-label">Confirm New Password</label><input class="form-input" type="password" name="confirm_password" required></div>
      <button class="btn btn-primary" type="submit">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
