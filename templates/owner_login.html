{% extends "base.html" %}
{% block title %}Store Owner Login – ApnaDukaan{% endblock %}
{% block content %}
<div style="max-width:420px; margin:60px auto;">
  <div class="card" style="padding:36px;">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:44px; margin-bottom:10px;">🔐</div>
      <h1 style="font-size:22px; font-weight:700;">Store Owner Login</h1>
      <p style="font-size:14px; color:var(--muted); margin-top:4px;">Access your store dashboard</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" name="username" type="text" required autofocus
               autocomplete="username" placeholder="your_username"
               style="font-size:15px; padding:12px 14px;">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" name="password" type="password" required
               autocomplete="current-password" placeholder="••••••••"
               style="font-size:15px; padding:12px 14px;">
      </div>
      <button class="btn btn-primary" type="submit"
              style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:4px;">
        Log In →
      </button>
    </form>

    <hr class="divider">

    <div style="text-align:center; font-size:14px; color:var(--muted);">
      New store owner?
      <a href="/owner/register" style="color:var(--green); font-weight:600;">Register your store</a>
    </div>

    <div style="margin-top:16px; padding:12px; background:var(--bg); border-radius:8px; font-size:12px; color:var(--muted); text-align:center;">
      Demo account: <strong>demo</strong> / <strong>demo123</strong>
    </div>

    <div style="text-align:center; margin-top:12px;">
      <a href="/" style="font-size:13px; color:var(--muted);">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
